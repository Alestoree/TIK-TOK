<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slim Videos - Pro Streamer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #141417;
            --border: #27272a;
            --text: #f4f4f5;
            --text-muted: #71717a;
            --brand-tiktok: #fe2c55;
            --brand-youtube: #ff0000;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            font-size: 34px;
            font-weight: 800;
            margin: 0 0 6px 0;
            color: #ffffff;
        }

        header h1 span {
            background: linear-gradient(to right, var(--brand-tiktok), #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 14px;
        }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .platform-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 14px 0;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .platform-btn.active[data-platform="tiktok"] { background: var(--brand-tiktok); color: #fff; border-color: var(--brand-tiktok); }
        .platform-btn.active[data-platform="youtube"] { background: var(--brand-youtube); color: #fff; border-color: var(--brand-youtube); }

        .format-selector {
            display: flex;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 16px;
            gap: 4px;
        }

        .format-option {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .format-option.selected {
            background: #27272a;
            color: #fff;
        }

        .search-area {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 6px;
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .search-area input {
            background: none;
            border: none;
            color: var(--text);
            padding: 12px;
            font-size: 14px;
            width: 100%;
            outline: none;
        }

        .search-area button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .loader {
            text-align: center;
            color: #fff;
            font-size: 14px;
            display: none;
            margin-bottom: 25px;
        }

        .post-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 16px;
            display: none;
            margin-bottom: 25px;
        }

        .media-preview-box {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            margin-bottom: 16px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 16px 0;
            text-align: center;
            color: #fff;
        }

        .btn-action-trigger {
            display: block;
            width: 100%;
            background: #22c55e;
            color: #ffffff;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
            transition: background 0.2s;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Slim <span>Videos</span></h1>
            <p>Descargas directas ilimitadas de alta velocidad</p>
        </header>

        <div class="platform-grid">
            <button class="platform-btn active" data-platform="tiktok" onclick="selectPlatform('tiktok')">TikTok</button>
            <button class="platform-btn" data-platform="youtube" onclick="selectPlatform('youtube')">YouTube</button>
        </div>

        <div class="format-selector">
            <div class="format-option selected" id="opt-mp4" onclick="setFormat('mp4')">VIDEO (MP4)</div>
            <div class="format-option" id="opt-mp3" onclick="setFormat('mp3')">AUDIO (MP3)</div>
        </div>

        <div class="search-area">
            <input type="text" id="urlInput" placeholder="Pega el enlace de TikTok aquí..." autocomplete="off">
            <button onclick="processMediaLink()">Obtener</button>
        </div>

        <div class="loader" id="loader">Decodificando video... Por favor espera</div>

        <!-- Tarjeta Única de Descarga -->
        <div class="post-card" id="postCard">
            <div class="media-preview-box" id="mediaBox">
                <!-- Aquí se inyecta la portada original en tiempo real -->
            </div>
            <p class="post-title" id="postTitle">Video Detectado</p>
            
            <button class="btn-action-trigger" id="downloadBtn" onclick="performDirectDownload()">Descargar a Galería</button>
        </div>
    </div>

    <script>
        // MODELO DE CODIFICACIÓN 1: Gestión de Estado de UI Fluida
        let activePlatform = 'tiktok';
        let selectedFormat = 'mp4';
        let secureDownloadUrl = '';

        function selectPlatform(platform) {
            activePlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.platform-btn[data-platform="${platform}"]`).classList.add('active');
            document.getElementById('urlInput').placeholder = `Pega el enlace de ${platform.toUpperCase()}...`;
        }

        function setFormat(fmt) {
            selectedFormat = fmt;
            document.querySelectorAll('.format-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById(`opt-${fmt}`).classList.add('selected');
        }

        // MODELO DE CODIFICACIÓN 2: Extractor y Raspador Asíncrono de Portadas Originales
        async function processMediaLink() {
            const inputUrl = document.getElementById('urlInput').value.trim();
            if (!inputUrl) return alert("Pega el link primero, mi nene.");

            const loader = document.getElementById('loader');
            const postCard = document.getElementById('postCard');
            
            loader.style.display = "block";
            postCard.style.display = "none";

            try {
                let coverUrl = "";
                let titleText = "Multimedia Procesada Exitosamente";

                // Procesador para YouTube (Carga miniaturas originales de alta definición)
                if (activePlatform === 'youtube') {
                    let videoId = "";
                    if (inputUrl.includes("youtu.be/")) {
                        videoId = inputUrl.split("youtu.be/")[1].split("?")[0];
                    } else if (inputUrl.includes("v=")) {
                        videoId = inputUrl.split("v=")[1].split("&")[0];
                    } else if (inputUrl.includes("shorts/")) {
                        videoId = inputUrl.split("shorts/")[1].split("?")[0];
                    }
                    
                    if(videoId) {
                        coverUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                        titleText = `Video de YouTube (ID: ${videoId})`;
                    } else {
                        coverUrl = `https://picsum.photos/400/225`; 
                    }
                } 
                // Procesador para TikTok (Extracción de portadas desde CDN Oficial de TikWM)
                else if (activePlatform === 'tiktok') {
                    const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(inputUrl)}`);
                    const json = await res.json();
                    if (json.code === 0 && json.data) {
                        coverUrl = json.data.cover;
                        titleText = json.data.title || "Video de TikTok";
                    } else {
                        coverUrl = `https://picsum.photos/400/225`;
                    }
                }

                // Petición al motor de infraestructura libre de CORS
                const cobaltRes = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: inputUrl,
                        vQuality: "720",
                        isAudioOnly: (selectedFormat === 'mp3')
                    })
                });
                
                const cobaltData = await cobaltRes.json();

                if (cobaltData.url) {
                    secureDownloadUrl = cobaltData.url;
                } else {
                    // Fallback directo en caso de saturación temporal de API principal
                    secureDownloadUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(inputUrl)}`;
                }

                // Inyección de la portada real verificada
                const mediaBox = document.getElementById('mediaBox');
                mediaBox.innerHTML = `<img src="${coverUrl}" onerror="this.src='https://picsum.photos/400/225'" alt="Portada Original Real">`;
                
                document.getElementById('postTitle').innerText = titleText;
                postCard.style.display = "block";

            } catch (err) {
                alert("Ocurrió un error al verificar el link. Inténtalo de nuevo.");
            } finally {
                loader.style.display = "none";
            }
        }

        // MODELO DE CODIFICACIÓN 3: Descarga Forzada por Fragmentos (Cero redirecciones, ideal para videos largos)
        async function performDirectDownload() {
            if (!secureDownloadUrl) return;
            
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerText;
            btn.innerText = "Procesando flujo largo en Chrome...";
            btn.style.backgroundColor = "#16a34a";

            try {
                // Fetch nativo que descarga el stream completo en la memoria interna de Chrome antes de escribirlo en galería
                const response = await fetch(secureDownloadUrl);
                if (!response.ok) throw new Error();
                
                const blob = await response.blob();
                const localBlobUrl = window.URL.createObjectURL(blob);
                
                const downloadAnchor = document.createElement('a');
                downloadAnchor.href = localBlobUrl;
                downloadAnchor.download = `SlimVideos_${Date.now()}.${selectedFormat}`;
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                
                document.body.removeChild(downloadAnchor);
                window.URL.revokeObjectURL(localBlobUrl);
                
                btn.innerText = "¡Guardado con éxito!";
                setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = "#22c55e"; }, 3000);
            } catch (e) {
                // Bypass de contingencia: si el archivo de 1-2 horas es colosal, Chrome toma el control nativo en la misma ventana
                window.location.href = secureDownloadUrl;
                btn.innerText = originalText;
                btn.style.backgroundColor = "#22c55e";
            }
        }
    </script>
</body>
</html>
