<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slim Videos - Pro Streamer</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#09090b; --card:#141417; --border:#27272a; --text:#f4f4f5; --text-muted:#71717a;
    --brand-tiktok:#fe2c55; --brand-youtube:#ff0000;
  }
  body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;margin:0;display:flex;justify-content:center;min-height:100vh;}
  .app-container{width:100%;max-width:440px;padding:24px;box-sizing:border-box;}
  header{text-align:center;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
  header .titles{flex:1;}
  header h1{font-size:30px;font-weight:800;margin:0 0 4px 0;color:#fff;}
  header h1 span{background:linear-gradient(to right,var(--brand-tiktok),#ff4500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  header p{color:var(--text-muted);margin:0;font-size:13px;}
  .gear-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:16px;}
  .platform-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  .platform-btn{background:var(--card);border:1px solid var(--border);color:var(--text-muted);padding:14px 0;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;}
  .platform-btn.active[data-platform="tiktok"]{background:var(--brand-tiktok);color:#fff;border-color:var(--brand-tiktok);}
  .platform-btn.active[data-platform="youtube"]{background:var(--brand-youtube);color:#fff;border-color:var(--brand-youtube);}
  .format-selector{display:flex;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:16px;gap:4px;}
  .format-option{flex:1;text-align:center;padding:10px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;color:var(--text-muted);}
  .format-option.selected{background:#27272a;color:#fff;}
  .search-area{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:6px;display:flex;align-items:center;margin-bottom:14px;}
  .search-area input{background:none;border:none;color:var(--text);padding:12px;font-size:14px;width:100%;outline:none;}
  .search-area button{background:#fff;color:#000;border:none;padding:12px 20px;border-radius:14px;font-weight:700;cursor:pointer;}
  .msg{font-size:13px;padding:12px 14px;border-radius:12px;margin-bottom:16px;display:none;line-height:1.4;}
  .msg.error{background:#3b0d0d;color:#fca5a5;border:1px solid #7f1d1d;}
  .msg.info{background:#0d2b3b;color:#93c5fd;border:1px solid #1e3a5f;}
  .loader{text-align:center;color:#fff;font-size:14px;display:none;margin-bottom:20px;}
  .post-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:16px;display:none;margin-bottom:20px;}
  .media-preview-box{width:100%;border-radius:16px;overflow:hidden;background:#000;margin-bottom:16px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;}
  .media-preview-box img{width:100%;height:100%;object-fit:cover;}
  .post-title{font-size:14px;font-weight:600;margin:0 0 16px 0;text-align:center;color:#fff;}
  .quality-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;}
  .quality-chip{background:#1f1f23;border:1px solid var(--border);color:var(--text-muted);padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;}
  .quality-chip.selected{background:#fff;color:#000;}
  .btn-action-trigger{display:block;width:100%;background:#22c55e;color:#fff;border:none;padding:16px;border-radius:16px;font-weight:700;font-size:16px;cursor:pointer;box-sizing:border-box;}
  .btn-action-trigger:disabled{background:#3f3f46;cursor:not-allowed;}
  .settings-panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:16px;display:none;}
  .settings-panel label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;}
  .settings-panel input{width:100%;box-sizing:border-box;background:#1f1f23;border:1px solid var(--border);color:#fff;padding:10px;border-radius:10px;font-size:13px;margin-bottom:10px;}
  .settings-panel small{color:var(--text-muted);font-size:11px;line-height:1.5;display:block;}
  .settings-panel a{color:#93c5fd;}
  .gallery-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:12px;color:var(--text-muted);}
  .gallery-toolbar span{cursor:pointer;color:#93c5fd;font-weight:700;}
  .gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .gallery-item{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;background:#000;cursor:pointer;}
  .gallery-item img{width:100%;height:100%;object-fit:cover;display:block;}
  .gallery-item .check{position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:6px;background:rgba(0,0,0,.55);border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;font-weight:800;}
  .gallery-item.selected .check{background:#22c55e;border-color:#22c55e;color:#fff;}
  .author-bar{display:none;align-items:center;gap:10px;margin-bottom:14px;background:#1a1a1e;padding:10px 12px;border-radius:14px;}
  .author-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#333;flex-shrink:0;}
  .author-name{flex:1;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .author-more-btn{background:#27272a;color:var(--text-muted);border:none;padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}
  .more-videos{display:none;margin-bottom:16px;}
  .more-videos-title{font-size:12px;color:var(--text-muted);margin:0 0 8px 0;font-weight:700;}
  .more-videos-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .more-videos-row img{width:70px;height:100px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;background:#000;}
</style>
</head>
<body>
<div class="app-container">
  <header>
    <div class="titles">
      <h1>Slim <span>Videos</span></h1>
      <p>Descargas directas sin límites y sin errores</p>
    </div>
  </header>

  <div class="platform-grid">
    <button class="platform-btn active" data-platform="tiktok" onclick="selectPlatform('tiktok')">TikTok</button>
    <button class="platform-btn" data-platform="youtube" onclick="selectPlatform('youtube')">YouTube</button>
  </div>

  <div class="format-selector" id="formatSelector">
    <div class="format-option selected" id="opt-mp4" onclick="setFormat('mp4')">VIDEO (MP4)</div>
    <div class="format-option" id="opt-mp3" onclick="setFormat('mp3')">AUDIO (MP3)</div>
  </div>

  <div class="search-area">
    <input type="text" id="urlInput" placeholder="Pega el enlace de TikTok aquí..." autocomplete="off">
    <button onclick="processMediaLink()">Obtener</button>
  </div>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg info" id="infoMsg"></div>
  <div class="loader" id="loader">Procesando video original... Por favor espera</div>

  <div class="post-card" id="postCard">
    <div class="media-preview-box" id="mediaBox"></div>
    <p class="post-title" id="postTitle">Contenido Listo</p>
    <div class="author-bar" id="authorBar">
      <img id="authorAvatar" class="author-avatar" src="" alt="avatar">
      <span id="authorName" class="author-name"></span>
      <button class="author-more-btn" onclick="loadMoreFromAuthor()">Más videos</button>
    </div>
    <div class="more-videos" id="moreVideosSection">
      <p class="more-videos-title">Toca uno para descargarlo</p>
      <div class="more-videos-row" id="moreVideosRow"></div>
    </div>
    <div class="quality-row" id="qualityRow"></div>
    <button class="btn-action-trigger" id="downloadBtn" onclick="performDirectDownload()">Descargar a Galería</button>
  </div>

  <div class="post-card" id="galleryCard">
    <p class="post-title" id="galleryTitle">Fotos de TikTok</p>
    <div class="gallery-toolbar">
      <span id="selectedCount">0 seleccionadas</span>
      <span onclick="toggleSelectAllGallery()">Seleccionar/Quitar todas</span>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
    <button class="btn-action-trigger" id="galleryDownloadBtn" onclick="downloadSelectedGallery()">Descargar seleccionadas</button>
  </div>
</div>

<script>
// 👉 Después de desplegar tu backend en Render, pega tu URL aquí:
const BACKEND_URL = 'https://TU-BACKEND.onrender.com';

let activePlatform = 'tiktok';
let selectedFormat = 'mp4';
let downloadUrlFinal = '';
let currentMedias = [];
let selectedMediaIndex = 0;
let currentAuthorContext = null;

function showError(text){
  hideMessages();
  const e = document.getElementById('errorMsg');
  e.innerText = text;
  e.style.display = 'block';
}
function showInfo(text){
  hideMessages();
  const i = document.getElementById('infoMsg');
  i.innerText = text;
  i.style.display = 'block';
}
function hideMessages(){
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('infoMsg').style.display = 'none';
}

function selectPlatform(platform){
  activePlatform = platform;
  document.querySelectorAll('.platform-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.platform-btn[data-platform="${platform}"]`).classList.add('active');
  document.getElementById('urlInput').placeholder = `Pega el enlace de ${platform.toUpperCase()}...`;
  document.getElementById('postCard').style.display = 'none';
  document.getElementById('galleryCard').style.display = 'none';
  document.getElementById('authorBar').style.display = 'none';
  document.getElementById('moreVideosSection').style.display = 'none';
  hideMessages();
}

function setFormat(fmt){
  selectedFormat = fmt;
  document.querySelectorAll('.format-option').forEach(o=>o.classList.remove('selected'));
  document.getElementById(`opt-${fmt}`).classList.add('selected');
}

async function processMediaLink(){
  const inputUrl = document.getElementById('urlInput').value.trim();
  if(!inputUrl) return showError('Pega un enlace primero.');

  hideMessages();
  const loader = document.getElementById('loader');
  const postCard = document.getElementById('postCard');
  const galleryCard = document.getElementById('galleryCard');
  const qualityRow = document.getElementById('qualityRow');
  qualityRow.innerHTML = '';
  loader.style.display = 'block';
  postCard.style.display = 'none';
  galleryCard.style.display = 'none';
  document.getElementById('authorBar').style.display = 'none';
  document.getElementById('moreVideosSection').style.display = 'none';
  downloadUrlFinal = '';
  currentMedias = [];

  try{
    if(activePlatform === 'tiktok'){
      await handleTikTok(inputUrl);
    } else {
      await handleYouTube(inputUrl);
    }
  } catch(err){
    showError(err.message || 'No se pudo procesar el enlace. Verifica que sea correcto.');
  } finally {
    loader.style.display = 'none';
  }
}

async function handleTikTok(inputUrl){
  const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(inputUrl)}`);
  const json = await res.json();

  if(json.code !== 0 || !json.data){
    throw new Error('TikWM no pudo procesar ese link. Revisa que el video sea público y el enlace correcto.');
  }

  const data = json.data;
  const author = data.author || {};
  if(author.unique_id){
    renderAuthor(author.nickname || author.unique_id, author.avatar, author.unique_id, 'tiktok');
  }

  // Post de fotos (slideshow): varias imágenes para elegir
  if(data.images && data.images.length){
    document.getElementById('galleryTitle').innerText = data.title || 'Fotos de TikTok';
    const items = data.images.map(imgUrl => ({ url: imgUrl, thumb: imgUrl, ext: 'jpg' }));
    renderGallery(items);
    return;
  }

  const coverUrl = data.cover;
  const titleText = data.title || 'Video de TikTok';
  downloadUrlFinal = selectedFormat === 'mp3'
    ? data.music
    : (data.hdplay || data.play);

  if(!downloadUrlFinal){
    throw new Error('Este video no tiene el formato solicitado disponible.');
  }

  document.getElementById('mediaBox').innerHTML = `<img src="${coverUrl}" alt="Miniatura">`;
  document.getElementById('postTitle').innerText = `${titleText} (${selectedFormat.toUpperCase()})`;
  document.getElementById('postCard').style.display = 'block';
}

async function handleYouTube(inputUrl){
  if(BACKEND_URL.includes('TU-BACKEND')){
    throw new Error('Todavía no configuras la URL de tu backend. Despliega el backend en Render y pega tu URL en la línea BACKEND_URL del código.');
  }

  const infoRes = await fetch(`${BACKEND_URL}/api/info?url=${encodeURIComponent(inputUrl)}`);
  if(!infoRes.ok){
    let detail = `Código HTTP ${infoRes.status}`;
    try{ const j = await infoRes.json(); detail += ` — ${j.error || JSON.stringify(j)}`; } catch(e){}
    throw new Error(`Falló el backend: ${detail}. Si tu servidor gratis estaba dormido, espera 30-50s e intenta de nuevo.`);
  }
  const data = await infoRes.json();
  if(data.error) throw new Error(data.error);

  document.getElementById('mediaBox').innerHTML = `<img src="${data.thumbnail}" alt="Miniatura">`;
  document.getElementById('postTitle').innerText = `${data.title || 'Video de YouTube'} (${selectedFormat.toUpperCase()})`;
  document.getElementById('postCard').style.display = 'block';

  if(data.uploader){
    renderAuthor(data.uploader, data.uploader_avatar, data.uploader_url, 'youtube');
  }

  const qualityRow = document.getElementById('qualityRow');
  qualityRow.innerHTML = '';

  if(selectedFormat === 'mp3'){
    downloadUrlFinal = `${BACKEND_URL}/api/download?url=${encodeURIComponent(inputUrl)}&audio=1`;
    return;
  }

  const qualities = (data.qualities && data.qualities.length) ? data.qualities : ['720p'];
  qualities.forEach((q, idx) => {
    const chip = document.createElement('div');
    chip.className = 'quality-chip' + (idx===0 ? ' selected' : '');
    chip.innerText = q;
    chip.onclick = () => {
      document.querySelectorAll('.quality-chip').forEach(c=>c.classList.remove('selected'));
      chip.classList.add('selected');
      downloadUrlFinal = `${BACKEND_URL}/api/download?url=${encodeURIComponent(inputUrl)}&quality=${q}`;
    };
    qualityRow.appendChild(chip);
  });
  downloadUrlFinal = `${BACKEND_URL}/api/download?url=${encodeURIComponent(inputUrl)}&quality=${qualities[0]}`;
}

function renderAuthor(name, avatar, extra, platform){
  const bar = document.getElementById('authorBar');
  if(!name){ bar.style.display = 'none'; currentAuthorContext = null; return; }
  document.getElementById('authorAvatar').src = avatar || '';
  document.getElementById('authorName').innerText = name;
  bar.style.display = 'flex';
  currentAuthorContext = { platform, extra };
  document.getElementById('moreVideosSection').style.display = 'none';
}

async function loadMoreFromAuthor(){
  if(!currentAuthorContext) return;
  const row = document.getElementById('moreVideosRow');
  row.innerHTML = '';
  document.getElementById('moreVideosSection').style.display = 'block';

  try{
    if(currentAuthorContext.platform === 'tiktok'){
      const uniqueId = currentAuthorContext.extra;
      const res = await fetch(`https://www.tikwm.com/api/user/posts?unique_id=${encodeURIComponent(uniqueId)}&count=12&cursor=0`);
      const json = await res.json();
      const videos = (json.data && json.data.videos) || [];
      if(!videos.length){ showInfo('No se encontraron más videos públicos de este usuario.'); return; }
      videos.forEach(v => {
        const img = document.createElement('img');
        img.src = v.cover;
        img.alt = v.title || 'video';
        img.onclick = () => {
          document.getElementById('urlInput').value = `https://www.tiktok.com/@${uniqueId}/video/${v.video_id}`;
          processMediaLink();
        };
        row.appendChild(img);
      });
    } else {
      if(!currentAuthorContext.extra){ showInfo('Este video no tiene un link de canal disponible.'); return; }
      const res = await fetch(`${BACKEND_URL}/api/channel_videos?channel_url=${encodeURIComponent(currentAuthorContext.extra)}`);
      const json = await res.json();
      const videos = json.videos || [];
      if(!videos.length){ showInfo('No se encontraron más videos de este canal.'); return; }
      videos.forEach(v => {
        const img = document.createElement('img');
        img.src = v.thumbnail;
        img.alt = v.title || 'video';
        img.onclick = () => {
          document.getElementById('urlInput').value = v.url;
          processMediaLink();
        };
        row.appendChild(img);
      });
    }
  } catch(e){
    showError('No se pudieron cargar más videos de este usuario.');
  }
}

// ---- Galería de selección múltiple (fotos de TikTok) ----
let galleryItems = [];
let selectedGalleryIndices = new Set();

function renderGallery(items){
  galleryItems = items;
  selectedGalleryIndices = new Set(items.map((_, i) => i));
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'gallery-item selected';
    div.innerHTML = `<img src="${item.thumb}" alt="item ${idx+1}"><div class="check">✓</div>`;
    div.onclick = () => {
      if(selectedGalleryIndices.has(idx)){
        selectedGalleryIndices.delete(idx);
        div.classList.remove('selected');
      } else {
        selectedGalleryIndices.add(idx);
        div.classList.add('selected');
      }
      updateGalleryUI();
    };
    grid.appendChild(div);
  });
  updateGalleryUI();
  document.getElementById('galleryCard').style.display = 'block';
}

function updateGalleryUI(){
  document.getElementById('selectedCount').innerText = `${selectedGalleryIndices.size} seleccionadas`;
  document.getElementById('galleryDownloadBtn').innerText = `Descargar seleccionadas (${selectedGalleryIndices.size})`;
}

function toggleSelectAllGallery(){
  if(selectedGalleryIndices.size === galleryItems.length){
    selectedGalleryIndices.clear();
    document.querySelectorAll('#galleryGrid .gallery-item').forEach(el => el.classList.remove('selected'));
  } else {
    selectedGalleryIndices = new Set(galleryItems.map((_, i) => i));
    document.querySelectorAll('#galleryGrid .gallery-item').forEach(el => el.classList.add('selected'));
  }
  updateGalleryUI();
}

async function downloadSelectedGallery(){
  if(!selectedGalleryIndices.size){
    showError('Selecciona al menos una foto o video.');
    return;
  }
  const btn = document.getElementById('galleryDownloadBtn');
  const original = btn.innerText;
  btn.disabled = true;

  const indices = Array.from(selectedGalleryIndices).sort((a, b) => a - b);
  for(let i = 0; i < indices.length; i++){
    const idx = indices[i];
    const item = galleryItems[idx];
    btn.innerText = `Descargando ${i+1}/${indices.length}...`;
    try{
      const res = await fetch(item.url, { mode: 'cors' });
      if(!res.ok) throw new Error();
      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = `SlimVideos_${Date.now()}_${idx+1}.${item.ext}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    } catch(e){
      window.open(item.url, '_blank');
    }
    await new Promise(r => setTimeout(r, 600)); // pausa breve para que el navegador no bloquee varias descargas seguidas
  }

  btn.innerText = original;
  btn.disabled = false;
}

async function performDirectDownload(){
  if(!downloadUrlFinal){
    showError('Error al procesar el archivo, intenta de nuevo.');
    return;
  }

  const btn = document.getElementById('downloadBtn');
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = 'Descargando...';

  // YouTube: nuestro backend ya manda el archivo con Content-Disposition:attachment,
  // así que con navegar directo el navegador ya lo descarga solo (sin CORS/blob).
  if(activePlatform === 'youtube'){
    window.location.href = downloadUrlFinal;
    setTimeout(() => { btn.innerText = originalText; btn.disabled = false; }, 4000);
    return;
  }

  // TikTok: el CDN no manda ese header, forzamos descarga trayendo el archivo como blob.
  try{
    const res = await fetch(downloadUrlFinal, { mode: 'cors' });
    if(!res.ok) throw new Error('fetch falló');
    const blob = await res.blob();
    const ext = selectedFormat === 'mp3' ? 'mp3' : 'mp4';
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = `SlimVideos_${Date.now()}.${ext}`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(blobUrl);
  } catch(e){
    window.open(downloadUrlFinal, '_blank');
    showInfo('Tu navegador bloqueó la descarga automática. Se abrió el archivo en una pestaña nueva: mantén presionado o usa el botón de descarga del reproductor para guardarlo.');
  }

  btn.innerText = originalText;
  btn.disabled = false;
}
</script>
</body>
</html>
